version: 0.2

env:
  parameter-store:
    SSH_PRIVATE_KEY: "/codebuild/ssh-key"

phases:
  install:
    runtime-versions:
      python: 3.11
      nodejs: 12
    commands:
      # Setup SSH key
      - mkdir -p ~/.ssh
      - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan -H 54.208.23.59 >> ~/.ssh/known_hosts
      
      # IMPORTANT: Navigate into your project folder
      - cd async-data-aggregator
      
      # Install backend dependencies
      - cd backend
      - pip install --upgrade pip
      - pip install -r requirements.txt
      - cd ..
      
      # Install frontend dependencies
      - cd frontend
      - npm install
      - cd ..

  build:
    commands:
      # Navigate to project folder again (build starts from root each time)
      - cd async-data-aggregator
      
      # Build frontend
      - cd frontend
      - npm run build
      - cd ..
      
      # Prepare deployment
      - mkdir -p deploy
      - cp -r backend deploy/
      - cp -r frontend/dist deploy/frontend

  post_build:
    commands:
      - echo "Deploying to EC2..."
      
      # Create directories on EC2
      - ssh ec2-user@54.208.23.59 "sudo mkdir -p /opt/data-aggregator/backend /var/www/html && sudo chown -R ec2-user:ec2-user /opt/data-aggregator /var/www/html"
      
      # Copy files from the deploy folder (notice the full path)
      - scp -r async-data-aggregator/deploy/backend/* ec2-user@54.208.23.59:/opt/data-aggregator/backend/
      - scp -r async-data-aggregator/deploy/frontend/* ec2-user@54.208.23.59:/var/www/html/
      
      - echo "Deployment complete!"

artifacts:
  files:
    - '**/*'
  discard-paths: no